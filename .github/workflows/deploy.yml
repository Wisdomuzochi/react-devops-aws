name: Build and Deploy React to S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build React and Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Installe les dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Build de production
      - name: Build React app
        run: npm run build

      # 5. Configure les credentials AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      # 6. Envoie les fichiers sur S3
      - name: Deploy to S3
        run: |
          aws s3 sync build/ s3://react-devops-aws-wisdom \
            --delete \
            --cache-control max-age=31536000

      # 7. Invalide le cache CloudFront
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"